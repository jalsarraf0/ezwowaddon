name: CI

on:
  push:
    branches: [main, dev, v2-development]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        shell: bash
        run: ruff check ezwow tests
      - name: Type check
        shell: bash
        run: mypy ezwow
      - name: Tests with coverage
        shell: bash
        run: pytest --cov=ezwow.core --cov-fail-under=100
